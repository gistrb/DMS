services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dmsdb
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: dms_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms -d dmsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./DMS.Backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=dmsdb;Username=dms;Password=dms_pass"
      ASPNETCORE_ENVIRONMENT: Development
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/Uploads

  frontend:
    build: ./DMS.Frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: /api

volumes:
  postgres_data:
  uploads_data:
